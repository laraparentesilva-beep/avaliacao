];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getAge(dob) {
if (!dob||dob.length<10) return null;
const [d,m,y]=dob.split(”/”).map(Number);
if (!d||!m||!y||y<1900) return null;
const t=new Date(); let age=t.getFullYear()-y;
if (t.getMonth()+1<m||(t.getMonth()+1===m&&t.getDate()<d)) age–;
return age>=0&&age<130?age:null;
}
function calcBMI(p,a){ return p&&a?(Number(p)/Math.pow(Number(a),2)).toFixed(1):null; }
function maskDate(v){ let s=v.replace(/\D/g,””); if(s.length>=3)s=s.slice(0,2)+”/”+s.slice(2); if(s.length>=6)s=s.slice(0,5)+”/”+s.slice(5,9); return s; }

// ─── SCORES ───────────────────────────────────────────────────────────────────
function calcScores(data) {
const age=getAge(data.nascimento), com=data.comorbidades||[], meds=data.meds||[], prob=data.prob_anest||[];
let apfel=0;
if(data.sexo===“F”) apfel++;
if(data.fumante===“nao”) apfel++;
if(prob.includes(“nvpo”)||data.cinetose===“sim”) apfel++;
let rcri=0;
if(com.includes(“ic”)) rcri++; if(com.includes(“dac”)) rcri++; if(com.includes(“avc”)) rcri++;
if(data.creatinina===“alta”) rcri++; if(meds.includes(“Insulina (qualquer tipo)”)) rcri++;
let frail=null;
if(age&&age>=65){ frail=0; if(data.exausto===“sim”)frail++; if(data.emagrecimento===“sim”)frail++; if(data.velocidade===“sim”)frail++; if(data.atividade===“nao”)frail++; if(com.filter(c=>c!==“nenhuma”).length>=5)frail++; }
let cha=null;
if(com.includes(“fa”)){ cha=0; if(com.includes(“ic”))cha++; if(com.includes(“has”))cha++; if(age&&age>=75)cha+=2; else if(age&&age>=65)cha++; if(com.includes(“dm”))cha++; if(com.includes(“avc”))cha+=2; if(com.includes(“dac”)||com.includes(“dvp”))cha++; if(data.sexo===“F”)cha++; }
const nHAS=meds.filter(m=>MEDS.antihipertensivos.items.includes(m)).length;
const nDM=meds.filter(m=>MEDS.diabetes.items.includes(m)).length;
const temGLP1=meds.some(m=>MEDS.glp1.items.includes(m));
const temAnticoag=meds.some(m=>MEDS.anticoag.items.includes(m));
const temImplante=meds.includes(“Implantes hormonais (gestrinona, testosterona, oxandrolona, etc.)”);
let nivel=“verde”; const motivos=[];
const addR=(t)=>{nivel=“vermelho”;motivos.push({cor:“r”,texto:t});};
const addA=(t)=>{if(nivel===“verde”)nivel=“amarelo”;motivos.push({cor:“a”,texto:t});};
if(rcri>=3) addR(“RCRI ≥ 3 — alto risco cardíaco perioperatório”);
if(frail!==null&&frail>=3) addR(“Fragilidade significativa (≥ 3 critérios FRAIL)”);
if(cha!==null&&cha>=4) addR(“CHA₂DS₂-VASc ≥ 4 em paciente com FA”);
if(prob.some(p=>![“nao”,“nunca”].includes(p))) addA(“Histórico de intercorrência em anestesia prévia”);
if(temAnticoag) addA(“Uso de anticoagulante ou antiplaquetário — orientar sobre suspensão pré-operatória”);
if(rcri===2) addA(“RCRI = 2 — risco cardiovascular intermediário”);
if(frail!==null&&frail===2) addA(“Pré-fragilidade identificada (2 critérios FRAIL)”);
if(data.mets===“nao”) addA(“Capacidade funcional muito limitada (< 4 METs)”);
if(temGLP1) addA(“Uso de análogo GLP-1 — avaliar protocolo de jejum estendido”);
if(temImplante) addA(“Uso de implante hormonal — avaliar impacto cardiovascular e na coagulação”);
if(meds.includes(“Insulina (qualquer tipo)”)||nDM>=2) addA(“Uso de insulina ou ≥ 2 antidiabéticos — revisar protocolo de suspensão pré-operatória”);
if(nHAS>=2) addA(“Uso de ≥ 2 anti-hipertensivos — avaliar necessidade de exames cardiológicos complementares”);
if(data.latex===“sim”) addA(“Alergia a látex relatada — planejar ambiente livre de látex”);
return {apfel,rcri,frail,cha,nivel,motivos,age,nHAS,nDM,temGLP1,temAnticoag};
}

// ─── WHATSAPP MESSAGE (clean, no problematic emojis) ──────────────────────────
function buildWAMsg(data,scores){
const {apfel,rcri,frail,cha,nivel,motivos,age}=scores;
const bmi=calcBMI(data.peso,data.altura);
const comList=(data.comorbidades||[]).filter(c=>c!==“nenhuma”).map(c=>COMORBIDADES.find(x=>x.value===c)?.label).filter(Boolean);
const probList=(data.prob_anest||[]).map(p=>PROB_ANEST.find(x=>x.value===p)?.label).filter(Boolean);
const nivelTxt=nivel===“verde”?“VERDE - Avaliacao no dia”:nivel===“amarelo”?“AMARELO - Recomenda-se contato previo”:“VERMELHO - Consulta presencial recomendada”;
const S=”––––––––––”;
const lines=[
`*AVALIACAO PRE-ANESTESICA*`,
`${new Date().toLocaleDateString("pt-BR")} ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`,
S,`*TRIAGEM: ${nivelTxt}*`,S,
`*IDENTIFICACAO*`,
`Nome: ${data.nome||"nao informado"}`,
`Nascimento: ${data.nascimento||"-"}${age?` (${age} anos)`:""}`,
`Sexo: ${data.sexo==="M"?"Masculino":data.sexo==="F"?"Feminino":"-"}`,
`Peso: ${data.peso?data.peso+" kg":"-"} | Altura: ${data.altura?data.altura.toFixed(2)+" m":"-"}${bmi?` | IMC: ${bmi}`:""}`,
`Procedimento: ${data.procedimento||"nao informado"}`,
data.data_procedimento?`Data prevista: ${data.data_procedimento}`:””,
S,`*HISTORICO*`,
`Alergia: ${data.alergia==="sim"?`Sim - ${data.alergia_qual||“nao especificada”}`:"Nao"}`,
`Latex: ${data.latex==="sim"?"Alergia relatada":data.latex==="nao"?"Sem alergia":"Nao informado"}`,
`Comorbidades: ${comList.length>0?comList.join(", "):"nenhuma"}`,
data.creatinina?`Creatinina: ${data.creatinina==="normal"?"Normal (ate 1,2)":data.creatinina==="alta"?"Alterada (acima 1,2 mg/dL)":"Nao sabe"}`:””,
`Anestesia previa: ${probList.length>0?probList.join(", "):"Nao"}`,
S,`*CAPACIDADE FISICA*`,
`METs: ${data.mets==="sim"?"4 METs ou mais":data.mets==="dif"?"Limitacao moderada":data.mets==="nao"?"Menos de 4 METs":"-"}`,
`Tabagismo: ${data.fumante==="nao"?"Nao fumante":data.fumante==="sim"?"Fumante/ex-fumante":"-"}`,
`Cinetose: ${data.cinetose==="sim"?"Sim":data.cinetose==="nao"?"Nao":"-"}`,
frail!==null?`FRAIL: ${frail}/5 - ${frail<=1?"Robusto":frail===2?"Pre-fragil":"Fragil"}`:””,
S,`*MEDICAMENTOS*`,
data.meds_nenhum?“Nenhum medicamento em uso regular”:(data.meds||[]).length>0?(data.meds||[]).map(m=>`- ${m}`).join(”\n”)+(data.med_outros?`\n- ${data.med_outros}`:””):“Nenhum selecionado”,
S,`*ESCORES*`,
`Apfel: ${apfel}/3 - ${apfel<=1?"Baixo risco":apfel===2?"Risco moderado":"Alto risco"}`,
`  > Apfel ${apfel}: opioide pos-op dose baixa ou ausente`,
`  > Apfel ${apfel+1}: opioide pos-op dose plena`,
`RCRI: ${rcri}/5 - ${rcri===0?"Muito baixo (~0,4%)":rcri===1?"Baixo (~1%)":rcri===2?"Moderado (~2,4%)":"Alto (~5,4%)"}`,
frail!==null?`FRAIL: ${frail}/5 - ${frail<=1?"Robusto":frail===2?"Pre-fragil":"Fragil"}`:`FRAIL: nao aplicavel (menos de 65 anos)`,
cha!==null?`CHA2DS2-VASc: ${cha}/9 - ${cha<=1?"Baixo":cha<=3?"Moderado":"Alto"}`:`CHA2DS2-VASc: nao aplicavel (sem FA)`,
motivos.length>0?`${S}\n*PONTOS DE ATENCAO*\n${motivos.map(m=>`${m.cor===“r”?”[ATENCAO]”:”[-]”} ${m.texto}`).join("\n")}`:””,
data.obs?`${S}\n*OBSERVACOES*\n${data.obs}`:””,
S,`_Enviado via formulario de triagem pre-anestesica_`,
];
return lines.filter(l=>l!==””).join(”\n”);
}

function openPDF(data,scores){
const {apfel,rcri,frail,cha,nivel,motivos,age}=scores;
const bmi=calcBMI(data.peso,data.altura);
const comList=(data.comorbidades||[]).filter(c=>c!==“nenhuma”).map(c=>COMORBIDADES.find(x=>x.value===c)?.label).filter(Boolean);
const probList=(data.prob_anest||[]).map(p=>PROB_ANEST.find(x=>x.value===p)?.label).filter(Boolean);
const hoje=new Date().toLocaleDateString(“pt-BR”);
const trgColor=nivel===“verde”?”#1e8a5e”:nivel===“amarelo”?”#9a6a00”:”#c0392b”;
const trgBg=nivel===“verde”?”#e6f8f0”:nivel===“amarelo”?”#fef8ec”:”#fdecea”;

const trgIcon=nivel===“verde”?“✅”:nivel===“amarelo”?“⚠️”:“🔴”;
const trgTitulo=nivel===“verde”?“Avaliação no dia do procedimento”:nivel===“amarelo”?“Recomenda-se contato prévio”:“Consulta presencial recomendada”;
const trgSub=nivel===“verde”?“Perfil de baixo risco. Encaminhar orientações de jejum, exames pré-operatórios e termo de consentimento.”:nivel===“amarelo”?“Pontos de atenção identificados. Sugere-se teleconsulta ou contato telefônico para orientações individualizadas.”:“Fatores de risco significativos identificados. Avaliação presencial antes do procedimento é fortemente recomendada.”;

function scoreBlock(titulo,sub,val,max,label,labelColor,desc,nota){
return `<div class="score-card"> <div class="score-head"><div class="score-title">${titulo}</div><div class="score-sub">${sub}</div></div> <div class="score-body"> <div class="score-num">${val}<span class="score-max">${typeof val==="number"?`/${max}`:""}</span></div> <div class="score-label" style="color:${labelColor}">${label}</div> <div class="score-desc">${desc}</div> ${nota?`<div class="score-nota">${nota}</div>`:""} </div> </div>`;
}

const apfelColor=apfel<=1?”#1e8a5e”:apfel===2?”#e67e22”:”#c0392b”;
const rcriColor=rcri<=1?”#1e8a5e”:rcri===2?”#e67e22”:”#c0392b”;

const alertsHtml=motivos.length>0?motivos.map(m=>` <div class="alert ${m.cor==="r"?"alert-red":"alert-yellow"}"> <span class="alert-icon">${m.cor==="r"?"🔴":"⚠️"}</span> <span>${m.texto}</span> </div>`).join(””):`<div class="alert alert-info"><span class="alert-icon">✅</span><span>Nenhum fator de risco significativo identificado.</span></div>`;

const medsHtml=data.meds_nenhum?”<em>Nenhum medicamento em uso regular</em>”:(data.meds||[]).length>0?[…(data.meds||[]),data.med_outros||””].filter(Boolean).map(m=>`<span class="med-tag">${m}</span>`).join(” “):”<em>Nenhum selecionado</em>”;

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────
function Radio({options,value,onChange,inline=false}){
return <div style={{display:“flex”,flexDirection:inline?“row”:“column”,flexWrap:“wrap”,gap:8}}>
{options.map(o=>(
<button key={o.value} type=“button” onClick={()=>onChange(o.value)} style={{display:“flex”,alignItems:“center”,gap:10,padding:“10px 14px”,borderRadius:8,cursor:“pointer”,border:value===o.value?`2px solid ${C.teal}`:`1.5px solid ${C.border}`,background:value===o.value?”#e6f6f3”:“white”,color:value===o.value?C.teal:C.text,fontFamily:“inherit”,fontSize:14,fontWeight:value===o.value?600:400,textAlign:“left”}}>
<span style={{width:16,height:16,borderRadius:“50%”,flexShrink:0,border:value===o.value?`5px solid ${C.teal}`:“2px solid #ccc”,background:“white”}}/>
{o.label}
</button>
))}

  </div>;
}

function Checks({options,values,onChange}){
const toggle=(val)=>{ if(val===“nenhuma”){onChange([“nenhuma”]);return;} const f=values.filter(v=>v!==“nenhuma”); onChange(f.includes(val)?f.filter(v=>v!==val):[…f,val]); };
return <div style={{display:“flex”,flexDirection:“column”,gap:8}}>
{options.map(o=>{ const on=values.includes(o.value); return(
<button key={o.value} type=“button” onClick={()=>toggle(o.value)} style={{display:“flex”,alignItems:“center”,gap:10,padding:“10px 14px”,borderRadius:8,cursor:“pointer”,border:on?`2px solid ${C.teal}`:`1.5px solid ${C.border}`,background:on?”#e6f6f3”:“white”,color:on?C.teal:C.text,fontFamily:“inherit”,fontSize:14,fontWeight:on?600:400,textAlign:“left”}}>
<span style={{width:16,height:16,borderRadius:4,flexShrink:0,border:on?“none”:“2px solid #ccc”,background:on?C.teal:“white”,display:“flex”,alignItems:“center”,justifyContent:“center”}}>{on&&<span style={{color:“white”,fontSize:10,fontWeight:700}}>✓</span>}</span>
{o.label}
</button>);
})}

  </div>;
}

function MedCat({catKey,cat,selected,onToggle}){
const [open,setOpen]=useState(false);
const count=cat.items.filter(i=>selected.includes(i)).length;
return <div style={{border:catKey===“glp1”?“1.5px solid #f0d060”:`1.5px solid ${C.border}`,borderRadius:10,marginBottom:8,overflow:“hidden”}}>
<button type=“button” onClick={()=>setOpen(o=>!o)} style={{width:“100%”,display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“12px 16px”,background:catKey===“glp1”?”#fffbf0”:“white”,border:“none”,cursor:“pointer”,fontFamily:“inherit”,fontSize:14,fontWeight:500}}>
<span>{cat.icon} {cat.label} {count>0&&<span style={{background:C.teal,color:“white”,borderRadius:10,padding:“1px 8px”,fontSize:11,marginLeft:6}}>{count}</span>}</span>
<span style={{fontSize:11,color:”#aaa”,transform:open?“rotate(180deg)”:“none”,transition:“transform 0.2s”,display:“inline-block”}}>▼</span>
</button>
{open&&<div style={{padding:“10px 14px 14px”,borderTop:`1px solid ${C.border}`}}>
{cat.alert&&<div style={{background:”#fff8e6”,border:“1px solid #f0d080”,borderRadius:6,padding:“8px 10px”,fontSize:12,color:”#8a5500”,marginBottom:10}}>⚠️ {cat.alert}</div>}
<div style={{display:“grid”,gridTemplateColumns:“repeat(auto-fill,minmax(155px,1fr))”,gap:6}}>
{cat.items.map(item=>{ const on=selected.includes(item); const name=item.includes(”(”)?item.split(”(”)[0].trim():item; const brand=item.match(/(([^)]+))/)?.[1];
return <button key={item} type=“button” onClick={()=>onToggle(item)} style={{display:“flex”,alignItems:“flex-start”,gap:8,padding:“8px 10px”,borderRadius:8,cursor:“pointer”,border:on?`2px solid ${C.teal}`:`1.5px solid ${C.border}`,background:on?”#e6f6f3”:“white”,fontFamily:“inherit”,textAlign:“left”}}>
<span style={{width:14,height:14,borderRadius:3,flexShrink:0,marginTop:2,border:on?“none”:“2px solid #ccc”,background:on?C.teal:“white”,display:“flex”,alignItems:“center”,justifyContent:“center”}}>{on&&<span style={{color:“white”,fontSize:9,fontWeight:700}}>✓</span>}</span>
<span><span style={{fontSize:13,fontWeight:500,color:on?C.teal:C.text,display:“block”}}>{name}</span>{brand&&<span style={{fontSize:11,color:C.muted}}>{brand}</span>}</span>
</button>;
})}
</div>
</div>}

  </div>;
}

function Field({label,hint,children}){ return <div style={{marginBottom:18}}><label style={{display:“block”,fontSize:14,fontWeight:500,marginBottom:hint?4:6,lineHeight:1.4}}>{label}{hint&&<span style={{display:“block”,fontSize:12,fontWeight:300,color:C.muted,marginTop:2}}>{hint}</span>}</label>{children}</div>; }
function Sub({children}){ return <div style={{fontSize:13,fontWeight:600,color:C.navy,marginBottom:12,marginTop:4,paddingLeft:10,borderLeft:`3px solid ${C.gold}`}}>{children}</div>; }
function Card({icon,title,subtitle,children}){ return <div style={{background:C.warm,borderRadius:12,border:`1px solid ${C.border}`,marginBottom:20,overflow:“hidden”}}><div style={{padding:“16px 22px 13px”,borderBottom:`1px solid ${C.border}`,display:“flex”,alignItems:“center”,gap:12}}><div style={{width:36,height:36,borderRadius:8,background:C.navy,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:17,flexShrink:0}}>{icon}</div><div><div style={{fontFamily:“Georgia,serif”,fontSize:17,fontWeight:600}}>{title}</div>{subtitle&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{subtitle}</div>}</div></div><div style={{padding:“18px 22px”}}>{children}</div></div>; }
function BtnRow({children}){ return <div style={{display:“flex”,gap:10,justifyContent:“flex-end”,marginTop:22,flexWrap:“wrap”}}>{children}</div>; }
function Btn({onClick,variant=“primary”,children}){ const s={primary:{background:C.navy,color:“white”,border:“none”},secondary:{background:“transparent”,color:C.navy,border:`1.5px solid ${C.navy}`},teal:{background:C.teal,color:“white”,border:“none”},wa:{background:”#25d366”,color:“white”,border:“none”}}; return <button type=“button” onClick={onClick} style={{padding:“12px 22px”,borderRadius:8,fontFamily:“inherit”,fontSize:14,fontWeight:600,cursor:“pointer”,…s[variant]}}>{children}</button>; }
function TxtIn({value,onChange,placeholder,type=“text”}){ return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:“100%”,padding:“10px 13px”,border:`1.5px solid ${C.border}`,borderRadius:8,fontFamily:“inherit”,fontSize:14,background:“white”,boxSizing:“border-box”}}/>; }
function HeightSlider({value,onChange}){ return <div><div style={{textAlign:“center”,fontSize:30,fontWeight:700,color:C.navy,fontFamily:“Georgia,serif”,marginBottom:8}}>{(value||1.50).toFixed(2)} <span style={{fontSize:16,fontWeight:400,color:C.muted}}>m</span></div><input type=“range” min={0.80} max={2.20} step={0.01} value={value||1.50} onChange={e=>onChange(parseFloat(e.target.value))} style={{width:“100%”,accentColor:C.teal,cursor:“pointer”}}/><div style={{display:“flex”,justifyContent:“space-between”,fontSize:11,color:C.muted,marginTop:4}}><span>0,80 m</span><span>1,50 m</span><span>2,20 m</span></div></div>; }

// ─── REVIEW ───────────────────────────────────────────────────────────────────
function RI({label,value}){ if(!value||value===”—”) return null; return <div style={{display:“flex”,gap:10,padding:“7px 0”,borderBottom:`1px solid ${C.border}`,fontSize:13}}><span style={{color:C.muted,minWidth:130,flexShrink:0}}>{label}</span><span style={{color:C.text,fontWeight:500}}>{value}</span></div>; }

function Review({data,onBack,onConfirm}){
const age=getAge(data.nascimento); const bmi=calcBMI(data.peso,data.altura);
const comList=(data.comorbidades||[]).filter(c=>c!==“nenhuma”).map(c=>COMORBIDADES.find(x=>x.value===c)?.label).filter(Boolean);
const probList=(data.prob_anest||[]).map(p=>PROB_ANEST.find(x=>x.value===p)?.label).filter(Boolean);
return <Card icon="✅" title="Revise suas respostas" subtitle="Confira antes de enviar">
<div style={{background:”#f0f4fa”,borderRadius:8,padding:“10px 14px”,marginBottom:16,fontSize:13,color:”#1a4a7a”,lineHeight:1.6}}>

</div>
<Sub>Identificação</Sub>
<RI label="Nome" value={data.nome}/><RI label=“Nascimento” value={data.nascimento?(data.nascimento+(age?` (${age} anos)`:””)):”—”}/><RI label=“Sexo” value={data.sexo===“M”?“Masculino”:data.sexo===“F”?“Feminino”:”—”}/><RI label=“Peso / Altura” value={data.peso&&data.altura?`${data.peso} kg / ${data.altura.toFixed(2)} m`+(bmi?` (IMC ${bmi})`:””):”—”}/><RI label=“Procedimento” value={data.procedimento||“não informado”}/>
<div style={{height:14}}/><Sub>Histórico de Saúde</Sub>
<RI label=“Alergia” value={data.alergia===“sim”?`Sim — ${data.alergia_qual||"não especificada"}`:“Não”}/><RI label=“Látex” value={data.latex===“sim”?“Alergia a látex”:data.latex===“nao”?“Sem alergia”:data.latex===“nao_sei”?“Não sabe”:”—”}/><RI label="Comorbidades" value={comList.length>0?comList.join(”, “):“nenhuma”}/>{data.creatinina&&<RI label=“Creatinina” value={data.creatinina===“normal”?“Normal (≤ 1,2)”:data.creatinina===“alta”?“Alterada (> 1,2 mg/dL)”:“Não sabe”}/>}<RI label="Anestesia prévia" value={probList.length>0?probList.join(”, “):”—”}/>
<div style={{height:14}}/><Sub>Capacidade Física</Sub>
<RI label=“Escada/caminhada” value={data.mets===“sim”?“Sem dificuldade”:data.mets===“dif”?“Com dificuldade”:data.mets===“nao”?“Não consegue”:”—”}/><RI label=“Saúde geral” value={{muito_boa:“Muito boa”,boa:“Boa”,regular:“Regular”,ruim:“Ruim”}[data.saude_geral]||”—”}/><RI label=“Cinetose” value={data.cinetose===“sim”?“Sim”:data.cinetose===“nao”?“Não”:”—”}/><RI label=“Tabagismo” value={data.fumante===“nao”?“Não fumante”:data.fumante===“sim”?“Fumante/ex-fumante”:”—”}/>
{age&&age>=65&&<><RI label=“Fadiga” value={data.exausto===“sim”?“Sim”:“Não”}/><RI label=“Perda de peso” value={data.emagrecimento===“sim”?“Sim (> 4,5 kg)”:“Não”}/><RI label=“Lentidão/limitação” value={data.velocidade===“sim”?“Sim”:“Não”}/><RI label=“Atividade física” value={data.atividade===“sim”?“Pratica”:“Não pratica”}/></>}
<div style={{height:14}}/><Sub>Medicamentos</Sub>
{data.meds_nenhum?<div style={{fontSize:13,color:C.muted,padding:“6px 0”}}>Nenhum medicamento em uso regular</div>:(data.meds||[]).length===0&&!data.med_outros?<div style={{fontSize:13,color:C.muted,padding:“6px 0”}}>Nenhum selecionado</div>:<div style={{fontSize:13,lineHeight:1.9}}>{(data.meds||[]).map(m=><div key={m}>• {m}</div>)}{data.med_outros&&<div>• {data.med_outros}</div>}</div>}
{data.obs&&<><div style={{height:14}}/><Sub>Observações</Sub><div style={{fontSize:13,lineHeight:1.6}}>{data.obs}</div></>}
<BtnRow><Btn variant="secondary" onClick={onBack}>← Voltar e corrigir</Btn><Btn variant="wa" onClick={onConfirm}>📲 Confirmar e enviar</Btn></BtnRow>
</Card>;
